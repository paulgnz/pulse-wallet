# XcodeGen spec — the source of truth for PulseWallet.xcodeproj.
# Regenerate the project any time with:  xcodegen generate
name: PulseWallet
options:
  bundleIdPrefix: dev.pulsevm
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""             # set your team in Xcode (Signing & Capabilities)
    ENABLE_HARDENED_RUNTIME: true
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: complete
    # Xcode-recommended settings (baked in so they survive `xcodegen generate`)
    DEAD_CODE_STRIPPING: true
    ENABLE_USER_SCRIPT_SANDBOXING: true

targets:
  PulseWallet:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
        excludes:
          - "Info.plist"
          - "PulseWallet.entitlements"
    resources:
      - Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pulsevm.wallet
        PRODUCT_NAME: PulseVM
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/PulseWallet.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true
        COMBINE_HIDPI_IMAGES: true
        # Link the vendored Rust core (build with scripts/build-core-macos.sh).
        SWIFT_OBJC_BRIDGING_HEADER: Vendor/PulseWallet-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/Vendor/include"
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/Vendor"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-lpulse_wallet_core"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
